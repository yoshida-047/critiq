<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRITIQ — Top Rated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

  <nav>
    <a class="logo" href="index.html">CRITIQ <span>// game reviews</span></a>
    <ul class="nav-links">
      <li><a href="browse.html">Browse</a></li>
      <li><a href="top-rated.html" style="color:var(--accent)">Top Rated</a></li>
      <li><a href="latest.html">Latest</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
        <div class="search-wrap">
      <div class="container">
        <div class="search-container">
          <input class="search-input" type="text" placeholder="search games..." autocomplete="off" />
          <svg viewBox="0 0 24 24" class="search__icon">
            <g>
              <path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path>
            </g>
          </svg>
        </div>
      </div>
      <div class="search-results"></div>
    </div>
  </nav>

  <section class="hero">
    <h1 class="hero-title">Top<br><em>Rated</em></h1>
    <div class="hero-meta">
      <div>sorted by score</div>
      <div>highest → lowest</div>
      <div>scored 0–100</div>
    </div>
  </section>

  <section class="section" id="listWrap" style="padding-top:3rem;">
    <div class="latest-list" id="topRatedList"></div>
  </section>

  <footer>
    <span>© 2026 CRITIQ</span>
    <span>scores reflect editorial opinion, not aggregates</span>
  </footer>

  <script src="js/games.js"></script>
  <script>
    const sorted = Object.values(GAMES).sort((a, b) => b.score - a.score);
    const list = document.getElementById('topRatedList');

    list.innerHTML = sorted.map((g, i) => `
      <a class="latest-item" href="review.html?game=${g.slug}" style="--i:${i}">
        <div class="latest-img">
          <img src="${g.image}" alt="${g.title}" loading="lazy" />
        </div>
        <div class="latest-body">
          <div class="latest-meta">
            <span class="tag">${g.tags[0]}</span>
            <span>${g.developer} · ${g.release}</span>
          </div>
          <div class="latest-title">${g.title}</div>
          <div class="latest-blurb">${g.lede}</div>
        </div>
        <div class="latest-score">
          <span style="font-family:var(--font-head);font-size:2.5rem;color:var(--accent);line-height:1;">${g.score}</span>
          <span class="verdict ${g.verdictClass}" style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.1em;">${g.verdict}</span>
        </div>
      </a>
    `).join('');
  </script>

  <script src="js/search.js"></script>
</body>
</html>
